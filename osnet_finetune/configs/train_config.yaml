# Torchreid training config (osnet_x0_25 + custom EYE-D data)
# 05_train_osnet.py loads this and passes to torchreid engine.
# batch_size: 32 for GTX 1060 6GB.

project:
  name: osnet_x0_25_eyed
  log_dir: log

data:
  root: data/market1501_root
  sources: [market1501_eyed]
  targets: [market1501_eyed]
  height: 256
  width: 128
  combineall: false
  transforms: [random_flip, random_erase, color_jitter]
  workers: 4
  norm_mean: [0.485, 0.456, 0.406]
  norm_std: [0.229, 0.224, 0.225]

sampler:
  train_sampler: RandomIdentitySampler
  num_instances: 4

model:
  name: osnet_x0_25
  pretrained: true

loss:
  name: triplet
  softmax:
    label_smooth: true
  triplet:
    margin: 0.3
    weight_t: 1.0
    weight_x: 1.0

train:
  optim: adam
  lr: 0.0003
  weight_decay: 5.0e-4
  max_epoch: 60
  batch_size: 32
  start_epoch: 0
  print_freq: 20
  fixbase_epoch: 10
  open_layers: [classifier]
  lr_scheduler: cosine
  warmup_epoch: 5

test:
  batch_size: 100
  dist_metric: cosine
  normalize_feature: true
  evaluate: false
  eval_freq: 10
  rerank: false
  visrank: false
